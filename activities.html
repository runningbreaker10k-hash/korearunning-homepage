<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>활동 - 전국러닝협회</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#2563eb', 'primary-dark': '#1e40af' },
          fontFamily: { sans: ['Noto Sans KR', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-white text-gray-900 antialiased">

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- PAGE HERO -->
  <section class="page-hero page-hero-white pt-28 pb-20 sm:pt-32 sm:pb-24">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      <nav class="breadcrumb flex items-center gap-2 text-xs mb-5">
        <a href="index.html">홈</a>
        <span><i class="fas fa-chevron-right text-[9px]"></i></span>
        <span class="text-white font-semibold">활동</span>
      </nav>
      <h1 class="text-3xl sm:text-4xl font-black text-white mb-2">활동 소식</h1>
      <p class="text-gray-400 text-sm sm:text-base font-light">전국러닝협회의 대회, 행사, 훈련 등 다양한 활동 소식을 전합니다.</p>
    </div>
  </section>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-14">

    <!-- 검색 + 건수 -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
      <p id="total-count" class="text-sm text-gray-400 font-medium">게시물 불러오는 중...</p>
      <div class="flex gap-2 w-full sm:w-auto">
        <div class="relative flex-1 sm:w-60">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
          <input id="search-input" type="text" placeholder="검색어를 입력하세요"
            class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-200 shadow-sm" />
        </div>
        <button id="search-btn"
          class="flex-shrink-0 bg-gray-900 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-gray-700 transition shadow-sm">
          검색
        </button>
      </div>
    </div>

    <!-- 카드 그리드 -->
    <div id="activities-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="col-span-full flex justify-center py-20"><div class="spinner"></div></div>
    </div>

    <!-- 더보기 -->
    <div id="load-more-wrap" class="hidden flex justify-center mt-12">
      <button id="load-more-btn"
        class="inline-flex items-center gap-2 border border-gray-200 text-gray-600 font-semibold px-8 py-3 rounded-xl hover:border-gray-400 hover:bg-gray-50 transition text-sm">
        <i class="fas fa-chevron-down text-xs"></i> 더 보기
      </button>
    </div>

  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js?v=6"></script>
  <script>
    const PAGE_SIZE = 9;
    let allItems = [], filtered = [], displayed = 0;

    async function loadAll() {
      try {
        const { data: dbData, error } = await supabaseClient.from('activities').select('*').limit(200);
        if (error) throw error;
        allItems = (dbData||[])
          .filter(i => i.is_published !== false)
          .sort((a,b) => new Date(b.published_at||b.created_at) - new Date(a.published_at||a.created_at));
        filtered = [...allItems];
        render(true);
      } catch(e) {
        document.getElementById('activities-grid').innerHTML =
          '<div class="col-span-full text-center py-16 text-gray-400 text-sm">데이터를 불러오지 못했습니다.</div>';
      }
    }

    function render(reset = false) {
      const grid = document.getElementById('activities-grid');
      if (reset) { grid.innerHTML = ''; displayed = 0; }
      if (filtered.length === 0 && displayed === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-20">
          <i class="fas fa-running text-gray-200 text-4xl mb-4 block"></i>
          <p class="text-gray-400 font-medium text-sm">등록된 게시물이 없습니다.</p>
        </div>`;
        document.getElementById('total-count').textContent = '총 0건';
        document.getElementById('load-more-wrap').classList.add('hidden');
        return;
      }
      const chunk = filtered.slice(displayed, displayed + PAGE_SIZE);
      chunk.forEach((item, idx) => {
        const card = document.createElement('article');
        card.className = 'activity-card group bg-white rounded-xl overflow-hidden border border-gray-100 cursor-pointer';
        card.id = `card-${item.id}`; // 디버깅용 ID
        card.innerHTML = `
          <div class="relative h-48 overflow-hidden bg-gray-100">
            <img src="${item.thumbnail||'https://images.unsplash.com/photo-1513593771513-7b58b6c4af38?w=600&q=80'}"
                 alt="${item.title}"
                 class="w-full h-full object-cover group-hover:scale-105 transition duration-500"
                 onerror="this.src='https://images.unsplash.com/photo-1513593771513-7b58b6c4af38?w=600&q=80'" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent"></div>
            ${item.images && item.images.length > 1 ? `<span class="absolute top-3 right-3 text-xs bg-black/50 text-white px-2.5 py-1 rounded-full"><i class="fas fa-images mr-1"></i>${item.images.length}</span>` : ''}
          </div>
          <div class="p-5">
            <h3 class="font-bold text-gray-900 text-sm sm:text-base leading-snug mb-2 line-clamp-2 group-hover:text-primary transition">${item.title}</h3>
            <p class="text-gray-400 text-xs leading-relaxed line-clamp-2 mb-4">${item.summary||''}</p>
            <div class="flex items-center justify-between text-xs text-gray-300 border-t border-gray-100 pt-3">
              <span class="flex items-center gap-1.5"><i class="fas fa-user-circle"></i>${item.author||'사무국'}</span>
              <span>${formatDate(item.published_at||item.created_at)}</span>
            </div>
          </div>`;
        grid.appendChild(card);

        // 클릭 이벤트는 appendChild 후에 바인딩
        const clickHandler = (e) => {
          e.stopPropagation();
          const targetUrl = `activity-detail?id=${item.id}`;
          window.location.href = targetUrl;
        };

        card.onclick = clickHandler;
        card.addEventListener('click', clickHandler);
      });
      displayed += chunk.length;
      document.getElementById('total-count').textContent = `총 ${filtered.length}건의 활동 소식`;
      const wrap = document.getElementById('load-more-wrap');
      displayed < filtered.length ? wrap.classList.remove('hidden') : wrap.classList.add('hidden');
    }

    function doSearch() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      filtered = q
        ? allItems.filter(i => (i.title||'').toLowerCase().includes(q)||(i.summary||'').toLowerCase().includes(q))
        : [...allItems];
      render(true);
    }
    document.getElementById('search-btn').addEventListener('click', doSearch);
    document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
    document.getElementById('load-more-btn').addEventListener('click', () => render(false));

    loadAll();

    // ─── 공통 컴포넌트 처리 완료됨 ───
  </script>
</body>
</html>
