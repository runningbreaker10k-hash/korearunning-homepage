<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>활동 상세 - 전국러닝협회</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#2563eb', 'primary-dark': '#1e40af' },
          fontFamily: { sans: ['Noto Sans KR', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-white text-gray-900 antialiased">

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- HERO IMAGE -->
  <div id="detail-hero" class="mt-16 md:mt-10 relative h-56 sm:h-72 md:h-96 bg-gray-200 overflow-hidden">
    <img id="detail-hero-img" src="" alt=""
         class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
  </div>

  <!-- ARTICLE -->
  <main class="max-w-3xl mx-auto px-4 sm:px-6 py-10 sm:py-14">

    <!-- 로딩 -->
    <div id="detail-loading" class="flex justify-center py-20"><div class="spinner"></div></div>

    <!-- 본문 (로드 후 표시) -->
    <article id="detail-content" class="hidden">
      <!-- 빵부스러기 -->
      <nav class="flex items-center gap-2 text-xs text-gray-400 mb-6">
        <a href="index.html" class="hover:text-gray-700 transition">홈</a>
        <i class="fas fa-chevron-right text-[9px]"></i>
        <a href="activities.html" class="hover:text-gray-700 transition">활동</a>
        <i class="fas fa-chevron-right text-[9px]"></i>
        <span id="detail-breadcrumb" class="text-gray-500 font-medium line-clamp-1">상세보기</span>
      </nav>

      <!-- 제목 -->
      <h1 id="detail-title" class="text-2xl sm:text-3xl font-black text-gray-900 leading-tight mb-4"></h1>

      <!-- 메타 -->
      <div class="flex flex-wrap items-center gap-4 text-xs text-gray-400 pb-6 border-b border-gray-100 mb-8">
        <span class="flex items-center gap-1.5"><i class="fas fa-user-circle text-gray-300"></i><span id="detail-author"></span></span>
        <span class="flex items-center gap-1.5"><i class="fas fa-calendar text-gray-300"></i><span id="detail-date"></span></span>
      </div>

      <!-- 요약 -->
      <p id="detail-summary" class="text-gray-500 text-base leading-relaxed mb-8 hidden"></p>

      <!-- 본문 -->
      <div id="detail-body" class="prose-content mb-10"></div>

      <!-- 이미지 갤러리 -->
      <div id="gallery-section" class="hidden mb-10">
        <div class="flex items-center gap-3 mb-4">
          <h3 class="font-bold text-gray-900 text-sm">갤러리</h3>
          <div class="flex-1 h-px bg-gray-100"></div>
          <span id="gallery-count" class="text-xs text-gray-400"></span>
        </div>
        <div id="gallery-grid" class="gallery-grid"></div>
      </div>

      <!-- 하단 네비 -->
      <div class="border-t border-gray-100 pt-8 flex items-center justify-between gap-4">
        <a href="activities.html"
           class="inline-flex items-center gap-2 text-sm text-gray-500 font-semibold hover:text-gray-900 transition">
          <i class="fas fa-arrow-left text-xs"></i> 목록으로
        </a>
        <div class="flex gap-2">
          <button id="share-btn"
            class="inline-flex items-center gap-2 border border-gray-200 text-gray-500 hover:border-gray-400 hover:text-gray-700 font-semibold px-4 py-2 rounded-xl text-xs transition">
            <i class="fas fa-share-alt text-xs"></i> 공유
          </button>
        </div>
      </div>
    </article>

    <!-- 오류 -->
    <div id="detail-error" class="hidden text-center py-20">
      <i class="fas fa-exclamation-circle text-gray-200 text-4xl mb-4 block"></i>
      <p class="text-gray-400 font-medium mb-6">게시물을 찾을 수 없습니다.</p>
      <a href="activities.html" class="inline-flex items-center gap-2 bg-gray-900 text-white font-semibold px-6 py-3 rounded-xl text-sm">
        <i class="fas fa-arrow-left text-xs"></i> 목록으로
      </a>
    </div>

  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox" onclick="closeLightbox()">
    <button class="absolute top-4 right-5 text-white/70 hover:text-white text-2xl z-10">&times;</button>
    <button id="lb-prev" class="absolute left-4 top-1/2 -translate-y-1/2 text-white/60 hover:text-white text-2xl z-10 p-2">&#8249;</button>
    <img id="lb-img" src="" alt="" />
    <button id="lb-next" class="absolute right-14 top-1/2 -translate-y-1/2 text-white/60 hover:text-white text-2xl z-10 p-2">&#8250;</button>
    <span id="lb-counter" class="absolute bottom-5 left-1/2 -translate-x-1/2 text-white/50 text-xs"></span>
  </div>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js?v=6"></script>
  <script>
    const id = new URLSearchParams(location.search).get('id');
    let galleryImages = [];
    let lbIdx = 0;

    async function loadDetail() {
      if (!id) {
        showError();
        return;
      }

      try {
        if (!supabaseClient) {
          throw new Error('Supabase 클라이언트 없음');
        }

        const { data: item, error } = await supabaseClient.from('activities').select('*').eq('id', id).single();

        if (error) {
          throw error;
        }
        if (!item) {
          throw new Error('게시물을 찾을 수 없습니다');
        }

        renderDetail(item);
      } catch(e) {
        showError();
      }
    }

    function renderDetail(item) {
      // 히어로
      const heroImg = document.getElementById('detail-hero-img');
      const thumb = item.thumbnail || 'https://images.unsplash.com/photo-1513593771513-7b58b6c4af38?w=1200&q=80';
      heroImg.src = thumb;
      heroImg.alt = item.title;
      document.title = `${item.title} - 전국러닝협회`;

      // 메타
      document.getElementById('detail-title').textContent = item.title;
      document.getElementById('detail-breadcrumb').textContent = item.title;
      document.getElementById('detail-author').textContent = item.author || '사무국';
      document.getElementById('detail-date').textContent = formatDate(item.published_at || item.created_at);

      // 요약
      if (item.summary) {
        const s = document.getElementById('detail-summary');
        s.textContent = item.summary;
        s.classList.remove('hidden');
      }

      // 본문
      document.getElementById('detail-body').innerHTML = item.content || '';

      // 갤러리
      let imgs = [];
      if (item.images) {
        if (Array.isArray(item.images)) imgs = item.images;
        else { try { imgs = JSON.parse(item.images); } catch { imgs = []; } }
      }
      galleryImages = imgs.filter(Boolean);
      if (galleryImages.length) {
        document.getElementById('gallery-section').classList.remove('hidden');
        document.getElementById('gallery-count').textContent = `${galleryImages.length}장`;
        const grid = document.getElementById('gallery-grid');
        galleryImages.forEach((src, i) => {
          const div = document.createElement('div');
          div.className = 'gallery-item';
          div.onclick = () => openLightbox(i);
          div.innerHTML = `<img src="${src}" alt="갤러리 ${i+1}" loading="lazy" onerror="this.parentElement.style.display='none'" />`;
          grid.appendChild(div);
        });
      }

      // 숨기기/보이기
      document.getElementById('detail-loading').classList.add('hidden');
      document.getElementById('detail-content').classList.remove('hidden');
    }

    function showError() {
      document.getElementById('detail-loading').classList.add('hidden');
      document.getElementById('detail-error').classList.remove('hidden');
    }

    // ─── 라이트박스 ───
    function openLightbox(i) {
      lbIdx = i;
      document.getElementById('lb-img').src = galleryImages[lbIdx];
      document.getElementById('lb-counter').textContent = `${lbIdx+1} / ${galleryImages.length}`;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.getElementById('lb-prev').onclick = e => {
      e.stopPropagation();
      lbIdx = (lbIdx - 1 + galleryImages.length) % galleryImages.length;
      document.getElementById('lb-img').src = galleryImages[lbIdx];
      document.getElementById('lb-counter').textContent = `${lbIdx+1} / ${galleryImages.length}`;
    };
    document.getElementById('lb-next').onclick = e => {
      e.stopPropagation();
      lbIdx = (lbIdx + 1) % galleryImages.length;
      document.getElementById('lb-img').src = galleryImages[lbIdx];
      document.getElementById('lb-counter').textContent = `${lbIdx+1} / ${galleryImages.length}`;
    };
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
      if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
    });

    // ─── 공유 ───
    document.getElementById('share-btn').addEventListener('click', () => {
      if (navigator.share) {
        navigator.share({ title: document.title, url: location.href });
      } else {
        navigator.clipboard.writeText(location.href).then(() => {
          showToast('링크가 복사되었습니다.', 'success');
        });
      }
    });

    // ─── 공통 ───
    // 공통
    loadDetail();
  </script>
</body>
</html>
