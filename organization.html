<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조직도 - 전국러닝협회</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            'primary-dark': '#1e40af',
          },
          fontFamily: { sans: ['Noto Sans KR', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 50;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    #modal.active {
      display: flex;
    }

    #modalImageContainer {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #modalImage {
      max-width: 100%;
      max-height: 100%;
      cursor: grab;
      transition: transform 0.2s ease-out;
      user-select: none;
    }

    #modalImage:active {
      cursor: grabbing;
    }

    .modal-controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 15px 20px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .modal-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 16px;
    }

    .modal-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    .modal-btn:active {
      transform: scale(0.95);
    }

    .zoom-display {
      position: absolute;
      top: 30px;
      right: 30px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      z-index: 10;
    }

    .close-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 20px;
      z-index: 10;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>

<body class="font-sans bg-white text-gray-900 antialiased">

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- PAGE HERO -->
  <section class="page-hero pt-28 pb-20 sm:pt-32 sm:pb-24">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      <nav class="breadcrumb flex items-center gap-2 text-xs mb-5">
        <a href="index.html">홈</a>
        <span><i class="fas fa-chevron-right text-[9px]"></i></span>
        <span class="text-white font-semibold">조직도</span>
      </nav>
      <h1 class="text-3xl sm:text-4xl font-black text-white mb-2">조직도</h1>
      <p class="text-gray-400 text-sm sm:text-base font-light">전국러닝협회의 조직 구성을 공개합니다.</p>
    </div>
  </section>

  <!-- MAIN: 이미지만 표시 -->
  <main class="bg-gray-50">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-14 sm:py-20">


      <!-- 조직도 이미지 -->
      <div class="flex justify-center">
        <img id="mainImage" src="images/organization.jpg" alt="전국러닝협회 본부 조직도"
          class="w-full max-w-4xl h-auto rounded-lg shadow-lg cursor-pointer hover:shadow-xl transition-shadow"
          loading="lazy" />
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- 모달: 확대 보기 -->
  <div id="modal">
    <button class="close-btn" id="closeBtn">
      <i class="fas fa-times"></i>
    </button>

    <div class="zoom-display">
      <span id="zoomPercent">100</span>%
    </div>

    <div id="modalImageContainer">
      <img id="modalImage" src="images/organization.jpg" alt="조직도 확대" />
    </div>

    <div class="modal-controls">
      <button class="modal-btn" id="zoomOutBtn" title="축소 (마우스휠 또는 -)">
        <i class="fas fa-minus"></i>
      </button>
      <button class="modal-btn" id="resetBtn" title="초기화 (1:1 또는 더블클릭)">
        <i class="fas fa-redo"></i>
      </button>
      <button class="modal-btn" id="zoomInBtn" title="확대 (마우스휠 또는 +)">
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    // ─── 조직도 확대 보기 기능 ───
    const modal = document.getElementById('modal');
    const mainImage = document.getElementById('mainImage');
    const modalImage = document.getElementById('modalImage');
    const closeBtn = document.getElementById('closeBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const resetBtn = document.getElementById('resetBtn');
    const zoomPercent = document.getElementById('zoomPercent');
    const modalImageContainer = document.getElementById('modalImageContainer');

    let zoom = 1;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;

    const MIN_ZOOM = 1;
    const MAX_ZOOM = 4;
    const ZOOM_STEP = 0.2;

    // 이미지 클릭: 모달 열기
    mainImage.addEventListener('click', () => {
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
      resetZoom();
    });

    // 모달 배경 클릭: 닫기
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });

    // 닫기 버튼
    closeBtn.addEventListener('click', closeModal);

    // ESC 키로 닫기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        closeModal();
      }
    });

    function closeModal() {
      modal.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // 줌 업데이트
    function updateZoom() {
      modalImage.style.transform = `scale(${zoom}) translate(${panX}px, ${panY}px)`;
      zoomPercent.textContent = Math.round(zoom * 100);
    }

    // 줌 초기화
    function resetZoom() {
      zoom = 1;
      panX = 0;
      panY = 0;
      updateZoom();
    }

    // 줌인
    zoomInBtn.addEventListener('click', () => {
      zoom = Math.min(zoom + ZOOM_STEP, MAX_ZOOM);
      updateZoom();
    });

    // 줌아웃
    zoomOutBtn.addEventListener('click', () => {
      zoom = Math.max(zoom - ZOOM_STEP, MIN_ZOOM);
      panX = 0;
      panY = 0;
      updateZoom();
    });

    // 리셋
    resetBtn.addEventListener('click', resetZoom);

    // 마우스 휠: 확대/축소
    modalImageContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.deltaY < 0) {
        zoom = Math.min(zoom + ZOOM_STEP, MAX_ZOOM);
      } else {
        zoom = Math.max(zoom - ZOOM_STEP, MIN_ZOOM);
        if (zoom === MIN_ZOOM) {
          panX = 0;
          panY = 0;
        }
      }
      updateZoom();
    }, { passive: false });

    // 더블클릭: 리셋
    modalImage.addEventListener('dblclick', resetZoom);

    // 드래그로 이미지 이동 (확대 상태일 때만)
    modalImage.addEventListener('mousedown', (e) => {
      if (zoom > MIN_ZOOM) {
        isDragging = true;
        dragStartX = e.clientX - panX;
        dragStartY = e.clientY - panY;
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging && zoom > MIN_ZOOM) {
        panX = e.clientX - dragStartX;
        panY = e.clientY - dragStartY;
        updateZoom();
      }
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // 키보드: +/- 로 줌 조절
    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('active')) return;
      if (e.key === '+' || e.key === '=') {
        zoom = Math.min(zoom + ZOOM_STEP, MAX_ZOOM);
        updateZoom();
      } else if (e.key === '-') {
        zoom = Math.max(zoom - ZOOM_STEP, MIN_ZOOM);
        if (zoom === MIN_ZOOM) {
          panX = 0;
          panY = 0;
        }
        updateZoom();
      }
    });
  </script>
</body>

</html>
