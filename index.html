<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="ZmbT5zLPERNwony2TTn10lYGeiKOoN6SdVP7soehA80" />
  <meta name="naver-site-verification" content="a825cb0fd7a445091077b0300c443cfb1edf8c28" />

  <title>전국러닝협회 - 대한민국 러닝의 중심</title>
  <meta name="description" content="전국러닝협회는 대한민국 러닝 문화의 발전과 건강한 커뮤니티 형성을 위해 헌신합니다." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#2563eb', 'primary-dark': '#1e40af' },
          fontFamily: { sans: ['Noto Sans KR', 'sans-serif'] }
        }
      }
    }
  </script>
</head>

<body class="font-sans bg-white text-gray-900 antialiased">

  <!-- =========== HEADER =========== -->
  <div id="header-placeholder"></div>

  <!-- =========== HERO =========== -->
  <section class="relative min-h-screen flex items-center overflow-hidden">
    <!-- 슬라이더 배경 -->
    <div id="hero-slider" class="absolute inset-0">
      <div class="hero-slide active absolute inset-0 bg-cover bg-center"
        style="background-image:url('https://images.unsplash.com/photo-1513593771513-7b58b6c4af38?w=1800&q=85')"></div>
      <div class="hero-slide absolute inset-0 bg-cover bg-center opacity-0"
        style="background-image:url('https://images.pexels.com/photos/2526878/pexels-photo-2526878.jpeg')">
      </div>
      <div class="hero-slide absolute inset-0 bg-cover bg-center opacity-0"
        style="background-image:url('https://images.unsplash.com/photo-1716573094354-e4c3226ba887?q=80&w=1742&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D')">
      </div>
    </div>
    <!-- 다크 오버레이 (이미지 가시성 확보) -->
    <div class="absolute inset-0 bg-gradient-to-r from-black/75 via-black/50 to-black/20"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>

    <!-- 텍스트 -->
    <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-28 pb-24 w-full">
      <div class="max-w-lg">
        <!-- 배지 -->
        <div
          class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 text-white text-xs font-semibold px-4 py-2 rounded-full mb-7 tracking-widest uppercase">
          <span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
          Korea National Running Association
        </div>
        <h1 class="text-4xl sm:text-5xl lg:text-6xl font-black text-white leading-[1.1] mb-5 tracking-tight">
          대한민국<br />
          <span class="text-primary">러닝의 중심</span>
        </h1>
        <p class="text-gray-200 text-base sm:text-lg leading-relaxed mb-10 font-light">
          전국 러너와 함께 건강하고 안전한<br />러닝 문화를 만들어 갑니다.
        </p>
        <div class="flex flex-wrap gap-3">
          <a href="activities.html"
            class="inline-flex items-center gap-2 bg-primary text-white font-bold px-7 py-3.5 rounded-xl hover:bg-primary-dark transition shadow-lg text-sm">
            <i class="fas fa-newspaper text-xs"></i> 최신 활동 보기
          </a>
          <a href="about.html"
            class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/30 text-white font-semibold px-7 py-3.5 rounded-xl hover:bg-white/20 transition text-sm">
            협회 소개
          </a>
        </div>
      </div>
    </div>

    <!-- 슬라이더 도트 -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-2 z-10">
      <button class="hero-dot active w-8 h-1.5 rounded-full bg-white" data-index="0"></button>
      <button class="hero-dot w-6 h-1.5 rounded-full bg-white/40" data-index="1"></button>
      <button class="hero-dot w-6 h-1.5 rounded-full bg-white/40" data-index="2"></button>
    </div>
  </section>

  <!-- =========== STATS =========== -->
  <section class="bg-gray-900 text-white py-10 sm:py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-0 text-center">
        <div
          class="stat-item px-4 py-4 border-r border-white/10 last:border-r-0 sm:last:border-r-0 [&:nth-child(2)]:border-r-0 md:[&:nth-child(2)]:border-r">
          <div class="text-3xl sm:text-4xl font-black text-primary mb-1" data-count="400">0</div>
          <div class="text-gray-400 text-xs sm:text-sm font-medium">전국 협회원 수</div>
        </div>
        <div class="stat-item px-4 py-4 border-r border-white/10 last:border-r-0 md:[&:nth-child(2)]:border-r">
          <div class="text-3xl sm:text-4xl font-black text-primary mb-1" data-count="26">0</div>
          <div class="text-gray-400 text-xs sm:text-sm font-medium">협력 러닝 크루</div>
        </div>
        <div class="stat-item px-4 py-4 border-r border-white/10 last:border-r-0 border-t md:border-t-0">
          <div class="text-3xl sm:text-4xl font-black text-primary mb-1" data-count="16">0</div>
          <div class="text-gray-400 text-xs sm:text-sm font-medium">연간 대회 수</div>
        </div>
        <div class="stat-item px-4 py-4 border-t md:border-t-0">
          <div class="text-3xl sm:text-4xl font-black text-primary mb-1" data-count="12">0</div>
          <div class="text-gray-400 text-xs sm:text-sm font-medium">지부 수</div>
        </div>
      </div>
    </div>
  </section>

  <!-- =========== LATEST ACTIVITIES =========== -->
  <section class="py-16 sm:py-24 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- 섹션 헤더 -->
      <div class="flex items-end justify-between mb-10">
        <div>
          <p class="text-primary text-xs font-bold tracking-widest uppercase mb-2">Latest Activities</p>
          <h2 class="text-2xl sm:text-3xl font-black text-gray-900">최신 활동 소식</h2>
          <div class="section-divider mt-3"></div>
        </div>
        <a href="activities.html"
          class="hidden sm:inline-flex items-center gap-2 text-sm text-gray-500 font-semibold hover:text-primary transition">
          전체 보기 <i class="fas fa-arrow-right text-xs"></i>
        </a>
      </div>

      <!-- 카드 그리드 -->
      <div id="latest-activities" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full flex justify-center py-12">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- 모바일 더보기 버튼 -->
      <div class="mt-8 text-center sm:hidden">
        <a href="activities.html"
          class="inline-flex items-center gap-2 text-sm text-primary font-bold border border-primary/30 px-6 py-2.5 rounded-xl hover:bg-gray-50 transition">
          전체 활동 보기 <i class="fas fa-arrow-right text-xs"></i>
        </a>
      </div>
    </div>
  </section>

  <!-- =========== QUOTE BANNER =========== -->
  <section class="relative py-20 sm:py-28 overflow-hidden">
    <div class="absolute inset-0 bg-cover bg-center bg-fixed"
      style="background-image:url('https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=1600&q=80')"></div>
    <!-- 다크 오버레이만 — 레드 없음 -->
    <div class="absolute inset-0 bg-black/65"></div>
    <div class="relative z-10 max-w-3xl mx-auto px-4 text-center text-white">
      <div class="w-10 h-px bg-primary mx-auto mb-8"></div>
      <blockquote class="text-xl sm:text-2xl lg:text-3xl font-light leading-relaxed mb-5 text-gray-100">
        "한 사람의 달리기가 모이면<br />대한민국이 건강해집니다."
      </blockquote>
      <cite class="text-gray-400 text-sm font-medium not-italic tracking-wide">
        — 이중범 회장, 전국러닝협회
      </cite>
      <div class="mt-10">
        <a href="about.html"
          class="inline-flex items-center gap-2 border border-white/30 text-white font-semibold px-7 py-3 rounded-xl hover:bg-white/10 transition text-sm">
          협회 소개 보기 <i class="fas fa-arrow-right text-xs"></i>
        </a>
      </div>
    </div>
  </section>

  <!-- =========== FOOTER =========== -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js?v=4"></script>
  <script>
    // ─── Hero Slider ───
    let cur = 0;
    const slides = document.querySelectorAll('.hero-slide');
    const dots = document.querySelectorAll('.hero-dot');
    function goSlide(i) {
      slides[cur].style.opacity = '0'; slides[cur].classList.remove('active');
      dots[cur].classList.remove('active', 'w-8', 'bg-white'); dots[cur].classList.add('w-6', 'bg-white/40');
      cur = i;
      slides[cur].style.opacity = '1'; slides[cur].classList.add('active');
      dots[cur].classList.add('active', 'w-8', 'bg-white'); dots[cur].classList.remove('w-6', 'bg-white/40');
    }
    dots.forEach(d => d.addEventListener('click', () => goSlide(+d.dataset.index)));
    setInterval(() => goSlide((cur + 1) % slides.length), 5500);

    // ─── Stats Counter ───
    function animateCounter(el) {
      const target = parseInt(el.dataset.count);
      let cur2 = 0;
      const step = target / (1600 / 16);
      const t = setInterval(() => {
        cur2 = Math.min(cur2 + step, target);
        el.textContent = Math.floor(cur2).toLocaleString();
        if (cur2 >= target) clearInterval(t);
      }, 16);
    }
    const statsWrap = document.querySelector('.stat-item')?.parentElement;
    if (statsWrap) {
      new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) document.querySelectorAll('[data-count]').forEach(animateCounter);
      }, { threshold: 0.3 }).observe(statsWrap);
    }

    // ─── Latest Activities ───
    async function loadLatest() {
      const el = document.getElementById('latest-activities');
      try {
        const { data: dbData, error } = await supabaseClient.from('activities').select('*').limit(50);
        if (error) throw error;
        const items = (dbData || [])
          .filter(i => i.is_published !== false)
          .sort((a, b) => new Date(b.published_at || b.created_at) - new Date(a.published_at || a.created_at))
          .slice(0, 3);
        if (!items.length) {
          el.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 text-sm">등록된 활동이 없습니다.</div>';
          return;
        }
        el.innerHTML = items.map(item => `
          <article class="activity-card group bg-white rounded-xl overflow-hidden border border-gray-100 cursor-pointer"
                   onclick="location.href='activity-detail.html?id=${item.id}'">
            <div class="relative h-48 overflow-hidden bg-gray-100">
              <img src="${item.thumbnail || 'https://images.unsplash.com/photo-1513593771513-7b58b6c4af38?w=600&q=80'}"
                   alt="${item.title}"
                   loading="lazy"
                   class="w-full h-full object-cover group-hover:scale-105 transition duration-500"
                   onerror="this.src='https://images.unsplash.com/photo-1513593771513-7b58b6c4af38?w=600&q=80'" />
              <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent"></div>
            </div>
            <div class="p-5">
              <h3 class="font-bold text-gray-900 text-sm sm:text-base leading-snug mb-2 line-clamp-2 group-hover:text-primary transition">${item.title}</h3>
              <p class="text-gray-400 text-xs leading-relaxed line-clamp-2 mb-4">${item.summary || ''}</p>
              <div class="flex items-center justify-between text-xs text-gray-300 border-t border-gray-100 pt-3">
                <span class="flex items-center gap-1.5"><i class="fas fa-user-circle text-gray-300"></i>${item.author || '사무국'}</span>
                <span>${formatDate(item.published_at || item.created_at)}</span>
              </div>
            </div>
          </article>`).join('');
      } catch (e) {
        el.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 text-sm">데이터를 불러올 수 없습니다.</div>';
      }
    }
    loadLatest();

    // ─── 공통 컴포넌트 처리 완료됨 ───
  </script>
</body>

</html>
